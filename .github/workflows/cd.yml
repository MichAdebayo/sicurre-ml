name: CD

# Triggered automatically only after CI passes on main.
# CD never runs on a commit that has not cleared all CI gates.
# Manual dispatch is available for emergency re-deploys without a code push.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (defaults to latest main SHA)"
        required: false
        default: ""

# Prevent concurrent deployments — only one pipeline runs at a time.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. Build & push ──────────────────────────────────────────────────────
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    # For workflow_run: skip immediately if CI did not succeed.
    # For workflow_dispatch: always proceed (operator-initiated re-deploy).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.image.outputs.name }}
      image_owner: ${{ steps.image.outputs.owner }}
      image_tag: ${{ steps.tag.outputs.tag }}
      service_version: ${{ steps.tag.outputs.service_version }}

    steps:
      # Checkout the exact commit that CI validated.
      # Falls back to HEAD (github.sha) for workflow_dispatch.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # GHCR requires a fully lowercase repository path.
      # github.repository returns mixed-case (e.g. "MichAdebayo/sicurre-ml").
      - name: Lowercase image name
        id: image
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "name=${owner}/sicurre-ml" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
          service_version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          echo "service_version=${service_version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_VERSION=${{ steps.tag.outputs.service_version }}

  # ── 2. Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      packages: read   # GITHUB_TOKEN passed to server-side docker login

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # docker-compose.prod.yml and deploy/alloy/config.alloy are versioned in
      # git. Syncing them here ensures the server always runs the configuration
      # that matches the deployed image — no manual file copying needed.
      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Copy Alloy config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy/alloy/config.alloy"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0

      - name: Copy Grafana dashboard assets to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy/grafana"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0

      - name: Copy deployment validation assets to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy/scripts,deploy/deployment-manifest.schema.json"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0

      - name: Pull image and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            previous_tag=$(sed -n 's/^IMAGE_TAG=//p' .env | tail -1)
            if [ -n "$previous_tag" ]; then
              printf '%s\n' "$previous_tag" > .previous-image-tag
            fi
            if [ -f deploy/current-deployment.json ]; then
              cp deploy/current-deployment.json deploy/previous-deployment.json
              python -c 'import json; print(json.load(open("deploy/current-deployment.json"))["deployment"]["container_image_digest"])' > .previous-image-digest
            fi

            # Write IMAGE_TAG and GHCR_OWNER into .env so docker compose resolves them.
            # Only these two deployment vars are touched — app secrets are managed separately.
            if grep -q '^IMAGE_TAG=' .env 2>/dev/null; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}|" .env
            else
              echo "IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}" >> .env
            fi
            if grep -q '^GHCR_OWNER=' .env 2>/dev/null; then
              sed -i "s|^GHCR_OWNER=.*|GHCR_OWNER=${{ needs.build-push.outputs.image_owner }}|" .env
            else
              echo "GHCR_OWNER=${{ needs.build-push.outputs.image_owner }}" >> .env
            fi
            if grep -q '^DEPLOYMENT_REVISION=' .env 2>/dev/null; then
              sed -i "s|^DEPLOYMENT_REVISION=.*|DEPLOYMENT_REVISION=${{ needs.build-push.outputs.image_tag }}|" .env
            else
              echo "DEPLOYMENT_REVISION=${{ needs.build-push.outputs.image_tag }}" >> .env
            fi

            # Authenticate to GHCR so docker pull can reach the private image.
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            docker compose -f docker-compose.prod.yml pull app
            image_digest=$(docker image inspect "ghcr.io/${{ needs.build-push.outputs.image_name }}:${{ needs.build-push.outputs.image_tag }}" --format '{{index .RepoDigests 0}}' | sed 's/.*@//')
            if grep -q '^CONTAINER_IMAGE_DIGEST=' .env 2>/dev/null; then
              sed -i "s|^CONTAINER_IMAGE_DIGEST=.*|CONTAINER_IMAGE_DIGEST=$image_digest|" .env
            else
              echo "CONTAINER_IMAGE_DIGEST=$image_digest" >> .env
            fi
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Remove dangling images to prevent disk fill-up over time.
            docker image prune -f

  # ── 3. Health check ──────────────────────────────────────────────────────
  # Runs ON the server via SSH, curling localhost:8001 directly.
  # This bypasses Cloudflare entirely — only the server itself can reach port 8001
  # (blocked at Hetzner firewall, not exposed to the internet).
  health-check:
    name: Validate deployment or roll back
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Validate health, model, auth, and response contract
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            validate() {
              app_container=$(docker compose -f docker-compose.prod.yml ps -q app)
              if [ -z "$app_container" ]; then
                echo "Unable to resolve the running app container." >&2
                return 1
              fi

              # Validate in the actual app container. This uses the exact
              # Compose-parsed runtime environment and does not copy all
              # production secrets into a second container.
              docker cp deploy/scripts/validate_deployment.py \
                "$app_container:/tmp/validate_deployment.py"
              docker exec \
                --env INFERENCE_INTERNAL_URL=http://127.0.0.1:8000 \
                --env DEPLOYMENT_MANIFEST_OUTPUT=/tmp/current-deployment.json \
                "$app_container" \
                python /tmp/validate_deployment.py
              docker cp "$app_container:/tmp/current-deployment.json" \
                deploy/current-deployment.json.tmp
              mv deploy/current-deployment.json.tmp deploy/current-deployment.json
            }

            if validate; then
              exit 0
            fi

            echo "New deployment validation failed; starting deterministic rollback." >&2
            previous_tag=$(cat .previous-image-tag 2>/dev/null || true)
            if [ -z "$previous_tag" ]; then
              echo "Rollback unavailable: no previous image tag recorded." >&2
              exit 1
            fi
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$previous_tag|" .env
            sed -i "s|^DEPLOYMENT_REVISION=.*|DEPLOYMENT_REVISION=$previous_tag|" .env
            previous_digest=$(cat .previous-image-digest 2>/dev/null || true)
            if [ -n "$previous_digest" ]; then
              sed -i "s|^CONTAINER_IMAGE_DIGEST=.*|CONTAINER_IMAGE_DIGEST=$previous_digest|" .env
            fi
            docker compose -f docker-compose.prod.yml up -d --no-deps app
            sleep 10
            if ! validate; then
              echo "Rollback image $previous_tag also failed validation." >&2
              exit 1
            fi
            echo "Rolled back to validated image tag $previous_tag." >&2
            exit 1

  observability-check:
    name: Validate telemetry delivery
    runs-on: ubuntu-latest
    needs: health-check
    permissions:
      contents: read
    steps:
      - name: Validate Alloy and telemetry pipelines
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            app_image=$(docker compose -f docker-compose.prod.yml images -q app)
            network=$(docker inspect "$(docker compose -f docker-compose.prod.yml ps -q app)" \
              --format '{{range $name, $_ := .NetworkSettings.Networks}}{{$name}}{{end}}')
            docker run --rm \
              --network "$network" \
              --volume "$PWD/deploy/scripts:/workspace:ro" \
              "$app_image" \
              python /workspace/validate_observability.py

  provision-dashboard:
    name: Provision Grafana dashboard
    runs-on: ubuntu-latest
    needs: observability-check
    permissions:
      contents: read
    steps:
      - name: Provision Sicurre ML dashboard
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            app_image=$(docker compose -f docker-compose.prod.yml images -q app)
            if [ -z "$app_image" ]; then
              echo "Unable to resolve the deployed sicurre-ml app image." >&2
              exit 1
            fi
            docker run --rm \
              --env-file deploy/env.alloy \
              --volume "$PWD/deploy/grafana:/workspace:ro" \
              "$app_image" \
              python /workspace/provision_dashboard.py \
              /workspace/dashboards/sicurre-ml-runtime.json

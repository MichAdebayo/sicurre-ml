name: CD

# Triggered automatically only after CI passes on main.
# CD never runs on a commit that has not cleared all CI gates.
# Manual dispatch is available for emergency re-deploys without a code push.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (defaults to latest main SHA)"
        required: false
        default: ""

# Prevent concurrent deployments — only one pipeline runs at a time.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. Build & push ──────────────────────────────────────────────────────
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    # For workflow_run: skip immediately if CI did not succeed.
    # For workflow_dispatch: always proceed (operator-initiated re-deploy).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.image.outputs.name }}
      image_owner: ${{ steps.image.outputs.owner }}
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      # Checkout the exact commit that CI validated.
      # Falls back to HEAD (github.sha) for workflow_dispatch.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # GHCR requires a fully lowercase repository path.
      # github.repository returns mixed-case (e.g. "MichAdebayo/sicurre-ml").
      - name: Lowercase image name
        id: image
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "name=${owner}/sicurre-ml" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      packages: read   # GITHUB_TOKEN passed to server-side docker login

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # docker-compose.prod.yml and deploy/alloy/config.alloy are versioned in
      # git. Syncing them here ensures the server always runs the configuration
      # that matches the deployed image — no manual file copying needed.
      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Copy Alloy config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy/alloy/config.alloy"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0

      - name: Copy Grafana dashboard assets to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy/grafana"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0

      - name: Pull image and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            # Write IMAGE_TAG and GHCR_OWNER into .env so docker compose resolves them.
            # Only these two deployment vars are touched — app secrets are managed separately.
            if grep -q '^IMAGE_TAG=' .env 2>/dev/null; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}|" .env
            else
              echo "IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}" >> .env
            fi
            if grep -q '^GHCR_OWNER=' .env 2>/dev/null; then
              sed -i "s|^GHCR_OWNER=.*|GHCR_OWNER=${{ needs.build-push.outputs.image_owner }}|" .env
            else
              echo "GHCR_OWNER=${{ needs.build-push.outputs.image_owner }}" >> .env
            fi

            # Authenticate to GHCR so docker pull can reach the private image.
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Remove dangling images to prevent disk fill-up over time.
            docker image prune -f

  # ── 3. Health check ──────────────────────────────────────────────────────
  # Runs ON the server via SSH, curling localhost:8001 directly.
  # This bypasses Cloudflare entirely — only the server itself can reach port 8001
  # (blocked at Hetzner firewall, not exposed to the internet).
  health-check:
    name: Health check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for /v1/health (via server localhost)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          # Polls 127.0.0.1:8001/v1/health every 10 s for up to 5 minutes.
          script: |
            for i in $(seq 1 30); do
              http_status=$(curl -s -o /dev/null -w "%{http_code}" \
                http://127.0.0.1:8001/v1/health 2>/dev/null)
              http_status=${http_status:-000}
              if [ "$http_status" = "200" ]; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/30: status=$http_status — retrying in 10s..."
              sleep 10
            done
            echo "Service failed to become healthy after 5 minutes."
            exit 1

      # Model-ready check — may take longer on cold start (fresh ONNX cache).
      # Polls 127.0.0.1:8001/v1/ready every 10 s for up to 15 minutes.
      - name: Confirm /v1/ready (via server localhost)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          # Must be longer than the poll loop (90 × 10s = 15 min).
          command_timeout: 20m
          script: |
            for i in $(seq 1 90); do
              response=$(curl -s http://127.0.0.1:8001/v1/ready 2>/dev/null)
              http_status=$(echo "$response" | grep -o '"status":"ready"' | wc -l | tr -d ' ')
              if [ "$http_status" = "1" ]; then
                echo "Model ready (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/90: $response — retrying in 10s..."
              sleep 10
            done
            echo "Model did not become ready after 15 minutes."
            exit 1

  provision-dashboard:
    name: Provision Grafana dashboard
    runs-on: ubuntu-latest
    needs: health-check
    permissions:
      contents: read
    steps:
      - name: Provision Sicurre ML dashboard
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            set -a
            . ./.env
            set +a
            bash deploy/grafana/provision_dashboard.sh

name: CI

# Runs on every push to every branch and on every pull request.
# Checks run independently in parallel. CD remains gated on the completed CI workflow.
# Merges to main are blocked by GitHub branch protection if any job fails.
on:
  push:
    branches: ["**"]
  pull_request:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── 1. Secret scanning ───────────────────────────────────────────────────
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # required by gitleaks-action on pull_request events
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required for gitleaks to scan all commits,
          # not just the HEAD checkout.
          fetch-depth: 0

      - name: Gitleaks — full git history scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Python literal secret scan
        # Scans .py files for hardcoded token/credential patterns.
        # Complements gitleaks which targets all file types.
        run: python .github/scripts/scan_secrets.py

  # ── 2. Lint + type check ──────────────────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev + inference deps
        run: uv sync --group dev --group inference --frozen

      - name: Ruff — style and import checks
        run: uv run ruff check src .github/scripts deploy/scripts tests

      - name: Mypy — static type checks
        run: uv run mypy src .github/scripts deploy/scripts tests

  # ── 3. Tests + coverage ──────────────────────────────────────────────────
  test:
    name: Tests (≥90% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev + ml + inference deps
        run: uv sync --group dev --group ml --group inference --frozen

      - name: Run unit tests with coverage gate
        run: |
          uv run pytest tests/unit \
            --cov=src/config \
            --cov=src/data \
            --cov=src/model \
            --cov=src/training \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── 4. Docker build check ────────────────────────────────────────────────
  # Runs independently and does not push the image.
  docker-build:
    name: Docker build (verify only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: sicurre-ml:ci-check
          # Use GitHub Actions cache to speed up repeated builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan container image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: sicurre-ml:ci-check
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

  dependency-audit:
    name: Production dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Export locked production dependencies
        run: >-
          uv export --no-default-groups --group inference --frozen
          --format requirements-txt --no-hashes
          --output-file /tmp/requirements-production.txt
      - name: Audit production Python dependencies
        # FastAPI 0.136.1 constrains Starlette below the published fixed line.
        # Exact exceptions and compensating controls are documented in
        # .github/security-audit-exceptions.md; no package-wide ignore is used.
        run: |
          uvx --python ${{ env.PYTHON_VERSION }} --from pip-audit pip-audit \
            --requirement /tmp/requirements-production.txt \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln PYSEC-2026-249 \
            --ignore-vuln PYSEC-2026-248 \
            --ignore-vuln PYSEC-2026-2281 \
            --ignore-vuln PYSEC-2026-2280

  dependency-audit-all:
    name: Training and tooling vulnerability report
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Export all locked dependency groups
        run: >-
          uv export --all-groups --frozen --format requirements-txt --no-hashes
          --output-file /tmp/requirements-all.txt
      - name: Report training and tooling vulnerabilities
        run: |
          set +e
          uvx --python ${{ env.PYTHON_VERSION }} --from pip-audit pip-audit \
            --requirement /tmp/requirements-all.txt
          audit_status=$?
          set -e
          if [ "$audit_status" -ne 0 ]; then
            echo "::warning title=Training/tooling dependency advisories::The non-production dependency audit found advisories. Review this step output; the production inference audit remains blocking."
          fi
          exit 0

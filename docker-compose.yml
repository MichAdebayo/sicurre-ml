name: sicurre-ml

# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — LOCAL DEVELOPMENT ONLY
#
# Starts the inference API.
# Uses a local build so code changes are picked up on the next `docker compose up`.
#
# Usage:
#   docker compose up          # start all services
#   docker compose up --build  # rebuild app image after dependency changes
#   docker compose down        # stop and remove containers
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Persist the ONNX model cache across container restarts so you don't
      # re-download 425 MB on every `docker compose up`.
      - onnx_cache:/tmp/sicurre_onnx

volumes:
  onnx_cache:

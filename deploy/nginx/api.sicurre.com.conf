# ─────────────────────────────────────────────────────────────────────────────

# Edge defence for the single trusted Sicurre service caller. The application
# enforces the configurable limit; this fixed outer ceiling protects the origin
# if application middleware is bypassed.
limit_req_zone $binary_remote_addr zone=sicurre_ml_inference:10m rate=5r/s;
# nginx virtual host — api.sicurre.com
#
# Belongs to: the shared nginx-proxy service at /opt/nginx-proxy on the server.
# Installed by: sicurre-ml CD → /opt/nginx-proxy/conf.d/api.sicurre.com.conf
#
# Architecture:
#   nginx-proxy runs with network_mode: host — it IS the host for networking.
#   127.0.0.1:8001 therefore reaches the sicurre-ml app directly on the host.
#   sicurre-ml app binds to 127.0.0.1:8001 (loopback only, no internet exposure).
#
# Cloudflare SSL mode: Full.
#   Cloudflare terminates TLS at edge, connects to origin on port 443.
#   SSL cert: Cloudflare Origin CA for sicurre.com zone
#   at /opt/nginx-proxy/ssl/sicurre-origin.pem
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name api.sicurre.com;

    ssl_certificate     /etc/nginx/ssl/sicurre-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/sicurre-origin-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    proxy_read_timeout    120s;
    proxy_connect_timeout  10s;
    proxy_send_timeout    120s;
    client_max_body_size 64k;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /v1/classify {
        limit_req zone=sicurre_ml_inference burst=10 nodelay;
        limit_req_status 429;
        error_page 429 = @rate_limited;

        # nginx-proxy uses network_mode: host — 127.0.0.1 reaches the server directly.
        # The sicurre-ml app binds to 127.0.0.1:8001 in docker-compose.prod.yml.
        proxy_pass http://127.0.0.1:8001;
    }

    location @rate_limited {
        default_type application/json;
        add_header Retry-After 1 always;
        return 429 '{"detail":"Inference rate limit exceeded"}';
    }

    location = /v1/health {
        proxy_pass http://127.0.0.1:8001;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8001;
    }

    location = /v1/ready {
        proxy_pass http://127.0.0.1:8001;
    }

    # Operational and documentation endpoints are internal-only.
    location ~ ^/(v1/metrics|v1/manifest|docs|redoc|openapi\.json)$ {
        return 404;
    }

    location / {
        return 404;
    }

    location /nginx_status {
        deny all;
    }
}

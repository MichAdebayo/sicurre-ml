# ─────────────────────────────────────────────────────────────────────────────
# nginx virtual host — api.sicurre.com
#
# Cloudflare handles TLS termination at the edge.
# Traffic arrives here as plain HTTP from Cloudflare's IP ranges.
# This config listens on port 80 only.
#
# Installation:
#   Copy this file into the nginx conf.d directory that the host nginx
#   (or the vinse-frontend-1 container) reads from, then reload nginx.
#
#   sudo nginx -t && sudo nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name api.sicurre.com;

    # Increase read timeout to allow for LLM calls (can take 20–30 s).
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;

    # Pass real client IP to the FastAPI app for logging.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        # The sicurre-ml app container is bound to 127.0.0.1:8001
        # in docker-compose.prod.yml.
        proxy_pass http://127.0.0.1:8001;
    }

    # Health and readiness probes — no rate limiting applied here;
    # rate limiting for these endpoints is handled inside FastAPI.
    location /v1/health {
        proxy_pass http://127.0.0.1:8001;
    }

    location /v1/ready {
        proxy_pass http://127.0.0.1:8001;
    }

    # Block direct access to the nginx status page if accidentally enabled.
    location /nginx_status {
        deny all;
    }
}

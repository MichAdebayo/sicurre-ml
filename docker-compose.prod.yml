name: sicurre-ml

# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — PRODUCTION (Hetzner server)
#
# References the pre-built GHCR image (set IMAGE_TAG in .env).
# App is bound to 127.0.0.1:8001 — nginx proxies public traffic to it.
# Grafana Alloy ships container logs to Grafana Cloud Loki.
#
# Requires on the server:
#   .env file with all secrets + IMAGE_TAG
#   deploy/alloy/config.alloy with Grafana Cloud credentials
#   Docker authenticated to ghcr.io (see deploy/README.md)
#
# Usage (run as sicurre-prod):
#   docker compose -f docker-compose.prod.yml pull app
#   docker compose -f docker-compose.prod.yml up -d --remove-orphans
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    image: ghcr.io/${GHCR_OWNER}/sicurre-ml:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      # Bound to loopback only — nginx-proxy uses network_mode: host so it reaches
      # 127.0.0.1:8001 directly. Port 8001 is not reachable from the internet;
      # block it at the Hetzner firewall.
      - "127.0.0.1:8001:8000"
    env_file: .env
    environment:
      # huggingface_hub writes lock/temp files to $HF_HOME.
      # The sicurre system user has no home dir, so redirect to the writable cache volume.
      HF_HOME: "/tmp/sicurre_onnx"
      # The application emits candidate spans to its ML-owned Alloy receiver.
      # These are non-secret transport/sampling settings; Grafana credentials
      # remain isolated in deploy/env.alloy and are visible only to Alloy.
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACE_SAMPLE_RATIO: "${OTEL_TRACE_SAMPLE_RATIO:-1.0}"
    volumes:
      - onnx_cache:/tmp/sicurre_onnx
    networks:
      sicurre-ml-internal:
        aliases:
          - app
          - inference.sicurre.internal
      sicurre-service-mesh:
        aliases:
          - inference.sicurre.internal
    logging:
      # Structured JSON logs are emitted to stdout and captured here.
      # Alloy tails these logs and ships them to Grafana Cloud Loki.
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  alloy:
    # Grafana Alloy: ships ML logs, metrics, and traces to Grafana Cloud.
    # Config file is in deploy/alloy/config.alloy — copy it to the server
    # before first deploy (see deploy/README.md).
    image: grafana/alloy:v1.16.1@sha256:51aeb9d829239345070619dad3edd6873186f913c84f45b365b74574fcb38ec0
    restart: unless-stopped
    env_file:
      - ./deploy/env.alloy
    environment:
      # Non-secret deployment setting. The server root .env may override it;
      # otherwise use the production telemetry-budget default.
      OTEL_TRACE_SAMPLE_PERCENT: ${OTEL_TRACE_SAMPLE_PERCENT:-10}
    volumes:
      - ./deploy/alloy/config.alloy:/etc/alloy/config.alloy:ro
      # Docker socket: needed for Alloy to discover container log paths.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # /var/lib/docker/containers: needed to read container log files.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - app
    networks:
      sicurre-ml-internal:
        aliases:
          - alloy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  onnx_cache:

networks:
  sicurre-ml-internal:
    name: sicurre-ml-internal
    driver: bridge
  sicurre-service-mesh:
    external: true
    name: sicurre-service-mesh
